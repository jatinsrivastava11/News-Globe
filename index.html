<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>3D Interactive Globe</title>
<style>
  html, body {
    margin: 0;
    height: 100%;
    background: #0a0a14;
    overflow: hidden;
    font-family: sans-serif;
  }
  #canvas { display: block; width: 100%; height: 100%; cursor: grab; }
  #canvas:active { cursor: grabbing; }
</style>
</head>
<body>
<canvas id="canvas"></canvas>

<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/build/three.min.js"></script>
<script>
  const canvas = document.getElementById('canvas');
  const renderer = new THREE.WebGLRenderer({ canvas, antialias: true });
  const scene = new THREE.Scene();
  const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 100);
  camera.position.z = 3.2;

  function resize() {
    renderer.setSize(window.innerWidth, window.innerHeight);
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
  }
  resize();
  window.addEventListener('resize', resize);

  // Earth sphere (ocean base)
  const sphere = new THREE.Mesh(
    new THREE.SphereGeometry(1, 64, 64),
    new THREE.MeshPhongMaterial({ color: 0x061a26, shininess: 10 })
  );
  scene.add(sphere);

  // Countries (land) layer drawn from world map texture
  const landTexture = (function() {
    const w = 2048, h = 1024;
    const c = document.createElement('canvas');
    c.width = w; c.height = h;
    const ctx = c.getContext('2d');
    // transparent background (ocean shows through from sphere)
    ctx.clearRect(0, 0, w, h);
    return { canvas: c, ctx, w, h };
  })();

  const landMesh = new THREE.Mesh(
    new THREE.SphereGeometry(1.002, 64, 64),
    new THREE.MeshPhongMaterial({
      map: null,
      transparent: true,
      opacity: 0,
      shininess: 10
    })
  );
  scene.add(landMesh);

  // Load world map GeoJSON and draw onto canvas texture
  fetch('https://cdn.jsdelivr.net/npm/world-atlas@2/countries-110m.json')
    .then(r => r.arrayBuffer())
    .then(buf => {
      // topojson client needed
      const script = document.createElement('script');
      script.src = 'https://cdn.jsdelivr.net/npm/topojson-client@3';
      script.onload = () => {
        const topo = bufferToJson(buf);
        const geo = topojson.feature(topo, topo.objects.countries);
        drawCountries(geo);
      };
      document.head.appendChild(script);
    });

  function bufferToJson(buf) {
    const text = new TextDecoder('utf-8').decode(buf);
    return JSON.parse(text);
  }

  function project(lon, lat, w, h) {
    const x = (lon + 180) * (w / 360);
    const y = (90 - lat) * (h / 180);
    return [x, y];
  }

  function drawRing(ctx, ring, w, h) {
    ctx.beginPath();
    let prev = null;
    ring.forEach((coord, i) => {
      const [x, y] = project(coord[0], coord[1], w, h);
      if (prev && Math.abs(x - prev[0]) > w / 2) {
        // crosses antimeridian - break the path to avoid a seam line
        ctx.closePath();
        ctx.fill();
        ctx.stroke();
        ctx.beginPath();
        ctx.moveTo(x, y);
      } else if (i === 0) {
        ctx.moveTo(x, y);
      } else {
        ctx.lineTo(x, y);
      }
      prev = [x, y];
    });
    ctx.closePath();
    ctx.fill();
    ctx.stroke();
  }

  function drawCountries(geo) {
    const { ctx, w, h } = landTexture;
    ctx.fillStyle = '#0d3b2e'; // dark neon green
    ctx.strokeStyle = '#11ffa0';
    ctx.lineWidth = 0.6;

    geo.features.forEach(feature => {
      const geom = feature.geometry;
      const polygons = geom.type === 'Polygon' ? [geom.coordinates] : geom.coordinates;
      polygons.forEach(rings => {
        rings.forEach(ring => drawRing(ctx, ring, w, h));
      });
    });

    const tex = new THREE.CanvasTexture(landTexture.canvas);
    tex.needsUpdate = true;
    landMesh.material.map = tex;
    landMesh.material.opacity = 1;
    landMesh.material.needsUpdate = true;

    // Build hoverable meshes for all countries
    geo.features.forEach(feature => {
      buildCountryMesh(feature, feature.properties && feature.properties.name || 'Unknown');
    });
  }

  // Convert lon/lat to a point on a sphere of given radius
  function latLonToVec3(lon, lat, radius) {
    const phi = (90 - lat) * (Math.PI / 180);
    const theta = (lon + 180) * (Math.PI / 180);
    return new THREE.Vector3(
      -radius * Math.sin(phi) * Math.cos(theta),
      radius * Math.cos(phi),
      radius * Math.sin(phi) * Math.sin(theta)
    );
  }

  // Subdivide a ring of [lon,lat] points so great-circle curvature is smooth on the sphere
  function subdivideRing(ring, maxDeg = 1.5) {
    const out = [];
    for (let i = 0; i < ring.length; i++) {
      const a = ring[i];
      const b = ring[(i + 1) % ring.length];
      out.push(a);
      const dx = b[0] - a[0], dy = b[1] - a[1];
      const dist = Math.sqrt(dx * dx + dy * dy);
      const steps = Math.min(20, Math.max(0, Math.floor(dist / maxDeg)));
      for (let s = 1; s <= steps; s++) {
        const t = s / (steps + 1);
        out.push([a[0] + dx * t, a[1] + dy * t]);
      }
    }
    return out;
  }

  // Normalize a ring's longitudes to avoid the antimeridian wrap entirely:
  // unwrap relative to first point, then shift whole ring to minimize spread.
  function normalizeRingLongitudes(ring) {
    const unwrapped = [ring[0].slice()];
    for (let i = 1; i < ring.length; i++) {
      let [lon, lat] = ring[i];
      const prevLon = unwrapped[i - 1][0];
      while (lon - prevLon > 180) lon -= 360;
      while (lon - prevLon < -180) lon += 360;
      unwrapped.push([lon, lat]);
    }
    const meanLon = unwrapped.reduce((s, c) => s + c[0], 0) / unwrapped.length;
    const offset = Math.round(meanLon / 360) * 360;
    return unwrapped.map(c => [c[0] - offset, c[1]]);
  }
  const hoverGroup = new THREE.Group();
  scene.add(hoverGroup);
  const shadowGroup = new THREE.Group();
  scene.add(shadowGroup);

  function buildCountryMesh(feature, name) {
    const geom = feature.geometry;
    if (!geom) return;
    const polygons = geom.type === 'Polygon' ? [geom.coordinates] : geom.coordinates;
    const baseRadius = 1.004;
    const liftRadius = 1.045;     // how far the country "pops" up
    const shadowRadius = 1.0005;  // shadow stays close to surface

    polygons.forEach(rings => {
      const normalizedOuter = normalizeRingLongitudes(rings[0]);
      const outerRing = subdivideRing(normalizedOuter);
      const holes = [];
      for (let i = 1; i < rings.length; i++) {
        holes.push(subdivideRing(normalizeRingLongitudes(rings[i])));
      }

      // Skip slivers/degenerate rings
      if (outerRing.length < 3) return;

      const shapePoints = outerRing.map(c => new THREE.Vector2(c[0], c[1]));
      const shape = new THREE.Shape(shapePoints);
      holes.forEach(h => shape.holes.push(new THREE.Path(h.map(c => new THREE.Vector2(c[0], c[1])))));

      // --- Top surface mesh (the "popped" country patch) ---
      const topGeom = new THREE.ShapeGeometry(shape);
      mapGeomToSphere(topGeom, liftRadius);
      const topMesh = new THREE.Mesh(
        topGeom,
        new THREE.MeshPhongMaterial({
          color: 0x11ffa0,
          transparent: true,
          opacity: 0,
          side: THREE.DoubleSide,
          depthWrite: true,
          depthTest: true,
          emissive: 0x11ffa0,
          emissiveIntensity: 0
        })
      );
      topMesh.userData.countryName = name;
      topMesh.userData.role = 'top';
      topMesh.userData.baseOpacity = 0.55;
      hoverGroup.add(topMesh);

      // --- Side wall mesh connecting base ring to lifted ring (gives the 3D pop depth) ---
      const wallGeom = buildWallGeometry(outerRing, baseRadius, liftRadius);
      const wallMesh = new THREE.Mesh(
        wallGeom,
        new THREE.MeshPhongMaterial({
          color: 0x0a8a64,
          transparent: true,
          opacity: 0,
          side: THREE.DoubleSide,
          depthWrite: true,
          depthTest: true
        })
      );
      wallMesh.userData.countryName = name;
      wallMesh.userData.role = 'wall';
      wallMesh.userData.baseOpacity = 0.5;
      hoverGroup.add(wallMesh);

      // --- Shadow patch on the globe surface, slightly offset ---
      const shadowShapePoints = outerRing.map(c => new THREE.Vector2(c[0] + 0.6, c[1] - 0.6));
      const shadowShape = new THREE.Shape(shadowShapePoints);
      const shadowGeom = new THREE.ShapeGeometry(shadowShape);
      mapGeomToSphere(shadowGeom, shadowRadius);
      const shadowMesh = new THREE.Mesh(
        shadowGeom,
        new THREE.MeshBasicMaterial({
          color: 0x000000,
          transparent: true,
          opacity: 0,
          side: THREE.DoubleSide,
          depthWrite: false
        })
      );
      shadowMesh.userData.countryName = name;
      shadowMesh.userData.role = 'shadow';
      shadowMesh.userData.baseOpacity = 0.4;
      shadowGroup.add(shadowMesh);

      // Pair the shadow with its top mesh for synced animation
      topMesh.userData.shadowMesh = shadowMesh;
      topMesh.userData.wallMesh = wallMesh;
    });
  }

  // Map a ShapeGeometry's XY (lon,lat) vertices onto a sphere of given radius
  function mapGeomToSphere(geometry, radius) {
    const posAttr = geometry.attributes.position;
    for (let i = 0; i < posAttr.count; i++) {
      const lon = posAttr.getX(i);
      const lat = posAttr.getY(i);
      const v = latLonToVec3(lon, lat, radius);
      posAttr.setXYZ(i, v.x, v.y, v.z);
    }
    posAttr.needsUpdate = true;
    geometry.computeVertexNormals();
  }

  // Build a ribbon of quads (as triangles) between the base ring (on sphere) and
  // the lifted ring (slightly above sphere), forming the "side wall" of the popped country
  function buildWallGeometry(ring, baseRadius, liftRadius) {
    const positions = [];
    const n = ring.length;
    for (let i = 0; i < n; i++) {
      const a = ring[i];
      const b = ring[(i + 1) % n];
      const aBase = latLonToVec3(a[0], a[1], baseRadius);
      const aTop = latLonToVec3(a[0], a[1], liftRadius);
      const bBase = latLonToVec3(b[0], b[1], baseRadius);
      const bTop = latLonToVec3(b[0], b[1], liftRadius);

      // two triangles per segment
      positions.push(
        aBase.x, aBase.y, aBase.z,
        bBase.x, bBase.y, bBase.z,
        aTop.x, aTop.y, aTop.z,

        bBase.x, bBase.y, bBase.z,
        bTop.x, bTop.y, bTop.z,
        aTop.x, aTop.y, aTop.z
      );
    }
    const geometry = new THREE.BufferGeometry();
    geometry.setAttribute('position', new THREE.Float32BufferAttribute(positions, 3));
    geometry.computeVertexNormals();
    return geometry;
  }

  // --- Hover interaction ---
  const raycaster = new THREE.Raycaster();
  const mouse = new THREE.Vector2();
  const tooltip = document.createElement('div');
  tooltip.style.position = 'absolute';
  tooltip.style.pointerEvents = 'none';
  tooltip.style.background = 'rgba(0,0,0,0.7)';
  tooltip.style.color = '#11ffa0';
  tooltip.style.padding = '4px 10px';
  tooltip.style.borderRadius = '6px';
  tooltip.style.fontSize = '13px';
  tooltip.style.fontFamily = 'sans-serif';
  tooltip.style.border = '1px solid #11ffa0';
  tooltip.style.display = 'none';
  tooltip.style.zIndex = '10';
  document.body.appendChild(tooltip);

  let hoveredName = null;

  canvas.addEventListener('mousemove', e => {
    const rect = canvas.getBoundingClientRect();
    mouse.x = ((e.clientX - rect.left) / rect.width) * 2 - 1;
    mouse.y = -((e.clientY - rect.top) / rect.height) * 2 + 1;

    raycaster.setFromCamera(mouse, camera);
    // Only raycast against the top patches (front-facing detection)
    const topMeshes = hoverGroup.children.filter(m => m.userData.role === 'top');
    let intersects = raycaster.intersectObjects(topMeshes);
    // Keep only hits on the side of the globe facing the camera
    intersects = intersects.filter(hit => {
      const worldNormal = hit.face.normal.clone()
        .applyNormalMatrix(new THREE.Matrix3().getNormalMatrix(hit.object.matrixWorld));
      const viewDir = camera.position.clone().sub(hit.point).normalize();
      return worldNormal.dot(viewDir) > 0;
    });

    if (intersects.length > 0) {
      const name = intersects[0].object.userData.countryName;
      hoveredName = name;
      tooltip.textContent = name;
      tooltip.style.left = (e.clientX + 12) + 'px';
      tooltip.style.top = (e.clientY + 12) + 'px';
      tooltip.style.display = 'block';
    } else {
      hoveredName = null;
      tooltip.style.display = 'none';
    }

    // Fade in/out top, wall, and shadow meshes for the hovered country
    hoverGroup.children.forEach(m => {
      const isHovered = hoveredName && m.userData.countryName === hoveredName;
      const target = isHovered ? m.userData.baseOpacity : 0;
      m.material.opacity = target;
      if (m.material.emissiveIntensity !== undefined) {
        m.material.emissiveIntensity = isHovered ? 0.4 : 0;
      }
    });
    shadowGroup.children.forEach(m => {
      const isHovered = hoveredName && m.userData.countryName === hoveredName;
      m.material.opacity = isHovered ? m.userData.baseOpacity : 0;
    });
  });

  canvas.addEventListener('mouseleave', () => {
    hoveredName = null;
    tooltip.style.display = 'none';
    hoverGroup.children.forEach(m => {
      m.material.opacity = 0;
      if (m.material.emissiveIntensity !== undefined) m.material.emissiveIntensity = 0;
    });
    shadowGroup.children.forEach(m => m.material.opacity = 0);
  });


  // Lighting
  scene.add(new THREE.AmbientLight(0xffffff, 0.6));
  const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
  dirLight.position.set(5, 3, 5);
  scene.add(dirLight);
  const fillLight = new THREE.DirectionalLight(0x11ffa0, 0.5);
  fillLight.position.set(-3, 2, 4);
  scene.add(fillLight);

  // Starfield background
  const starPositions = [];
  for (let i = 0; i < 1500; i++) {
    starPositions.push(
      (Math.random() - 0.5) * 50,
      (Math.random() - 0.5) * 50,
      (Math.random() - 0.5) * 50
    );
  }
  const starGeo = new THREE.BufferGeometry();
  starGeo.setAttribute('position', new THREE.Float32BufferAttribute(starPositions, 3));
  const stars = new THREE.Points(starGeo, new THREE.PointsMaterial({ color: 0xffffff, size: 0.05 }));
  scene.add(stars);

  // Interaction
  let rotY = 0, rotX = 0.3;
  let dragging = false, lastX = 0, lastY = 0;
  const ROTATION_SPEED = 0.0007;

  canvas.addEventListener('pointerdown', e => { dragging = true; lastX = e.clientX; lastY = e.clientY; });
  window.addEventListener('pointerup', () => dragging = false);
  window.addEventListener('pointermove', e => {
    if (!dragging) return;
    rotY += (e.clientX - lastX) * 0.005;
    rotX += (e.clientY - lastY) * 0.005;
    rotX = Math.max(-1.4, Math.min(1.4, rotX));
    lastX = e.clientX; lastY = e.clientY;
  });

  // Zoom with scroll
  canvas.addEventListener('wheel', e => {
    camera.position.z += e.deltaY * 0.002;
    camera.position.z = Math.max(1.5, Math.min(8, camera.position.z));
    e.preventDefault();
  }, { passive: false });

  function animate() {
    requestAnimationFrame(animate);
    if (!dragging) {
      rotY += ROTATION_SPEED;
    }
    sphere.rotation.y = rotY;
    sphere.rotation.x = rotX;
    landMesh.rotation.y = rotY;
    landMesh.rotation.x = rotX;
    hoverGroup.rotation.y = rotY;
    hoverGroup.rotation.x = rotX;
    shadowGroup.rotation.y = rotY;
    shadowGroup.rotation.x = rotX;
    renderer.render(scene, camera);
  }
  animate();
</script>
</body>
</html>
